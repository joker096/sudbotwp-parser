<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Страница не найдена</title>
    <meta name="robots" content="noindex,follow" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 620px;
        width: 100%;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.06);
      }
      h1 { margin: 0 0 8px; font-size: 40px; }
      p { margin: 0 0 16px; color: #475569; line-height: 1.5; }
      a {
        display: inline-block;
        text-decoration: none;
        background: #0f172a;
        color: #fff;
        padding: 12px 18px;
        border-radius: 10px;
        font-weight: 600;
      }
      a:hover { background: #1e293b; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>404</h1>
      <p>Страница не найдена или была удалена.</p>
      <p>Проверьте адрес или вернитесь на главную страницу сайта.</p>
      <a href="/">Перейти на главную</a>
    </main>
  </body>
</html>
