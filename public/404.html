<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена | Судовой Бот</title>
    <meta name="description" content="Запрашиваемая страница не найдена. Возможно, она была перемещена или удалена.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        
        .icon svg {
            width: 50px;
            height: 50px;
            fill: white;
        }
        
        h1 {
            font-size: 80px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            line-height: 1;
        }
        
        h2 {
            font-size: 24px;
            color: #555;
            margin-bottom: 20px;
        }
        
        p {
            color: #777;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #555;
            border: 2px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #eee;
        }
        
        .links {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        
        .links-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
        }
        
        .links-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .links-list a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .links-list a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }
            
            h1 {
                font-size: 60px;
            }
            
            h2 {
                font-size: 20px;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                <path d="M0 0h24v24H0z" fill="none"/>
            </svg>
        </div>
        
        <h1>404</h1>
        <h2>Страница не найдена</h2>
        <p>
            К сожалению, запрашиваемая страница не существует или была перемещена. 
            Возможно, вы ввели неправильный адрес или страница устарела.
        </p>
        
        <div class="buttons">
            <a href="/" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                На главную
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
                Назад
            </a>
        </div>
        
        <div class="links">
            <div class="links-title">Возможно, вам будут полезны:</div>
            <div class="links-list">
                <a href="/search">Поиск дел</a>
                <a href="/lawyers">Юристы</a>
                <a href="/calculator">Калькулятор</a>
                <a href="/blog">Блог</a>
                <a href="/help">Помощь</a>
            </div>
        </div>
    </div>
</body>
</html>
